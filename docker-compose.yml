version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: face_manager_db
    environment:
      POSTGRES_DB: face_manager
      POSTGRES_USER: face_manager_user
      POSTGRES_PASSWORD: secure_password_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - face_manager_network

  # Redis for sessions and caching
  redis:
    image: redis:7-alpine
    container_name: face_manager_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - face_manager_network

  # Face Manager Web Application
  web:
    build: .
    container_name: face_manager_web
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://face_manager_user:secure_password_change_me@postgres:5432/face_manager
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your-super-secret-key-change-this-in-production
    ports:
      - "5000:5000"
    volumes:
      - ./faces:/app/faces
      - ./models:/app/models
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - face_manager_network

  # Nginx Reverse Proxy (Optional, for production)
  nginx:
    image: nginx:alpine
    container_name: face_manager_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - face_manager_network

volumes:
  postgres_data:
  redis_data:

networks:
  face_manager_network:
    driver: bridge
